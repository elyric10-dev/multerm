name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release -p multerm-app --bins

      - name: Package macOS app
        run: |
          chmod +x scripts/package-macos.sh
          ./scripts/package-macos.sh "${{ github.ref_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: multerm-macos-arm64
          path: dist/release-macos-arm64/*

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            libxkbcommon-dev \
            libvulkan-dev \
            libasound2-dev

      - name: Build release binaries
        run: cargo build --release -p multerm-app --bins

      - name: Package Linux tarball
        run: |
          chmod +x scripts/package-linux.sh
          ./scripts/package-linux.sh "${{ github.ref_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: multerm-linux-x86_64
          path: dist/multerm-*-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release -p multerm-app --bins

      - name: Package Windows zip
        shell: pwsh
        run: ./scripts/package-windows.ps1 "${{ github.ref_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: multerm-windows-x86_64
          path: dist/multerm-*-windows-x86_64.zip

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/multerm-macos-arm64/*
            artifacts/multerm-linux-x86_64/*
            artifacts/multerm-windows-x86_64/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
